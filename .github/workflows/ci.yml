name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm with Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Demo route guardrail
        run: pnpm --filter @workspace/scripts run check-demo-routes

      - name: Pricing drift guardrail
        run: pnpm --filter @workspace/scripts run check-pricing-drift

      - name: Portal separation guardrail
        run: pnpm --filter @workspace/scripts run check-portal-separation

      - name: Business rule guardrail
        run: pnpm --filter @workspace/scripts run check-business-guardrails

      - name: ChatGPT-managed Sites source-of-truth guardrail
        run: pnpm --filter @workspace/scripts run check-chatgpt-sites-migration-source-truth

      - name: First-client readiness guardrail
        run: pnpm --filter @workspace/scripts run check-first-client-readiness

      - name: E2E route/auth/data-boundary QA
        run: pnpm --filter @workspace/veroxa run test:e2e
