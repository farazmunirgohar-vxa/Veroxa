name: Sites Verify

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sites-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Sites Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: artifacts/veroxa-sites
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: artifacts/veroxa-sites/package-lock.json

      - name: Install Sites dependencies
        run: npm ci

      - name: Build, validate artifact, and test rendered routes
        run: npm test

      - name: Lint Sites delivery layer
        run: npm run lint
